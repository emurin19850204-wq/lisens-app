# LISENS - Netlify設定（静的エクスポート用）
# Next.jsプラグインを使わず、純粋な静的サイトとしてデプロイする

[build]
  command = "npm run build"
  publish = "out"

# Next.jsプラグインを無効化（静的エクスポートでは不要）
[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# 静的アセットのキャッシュ設定
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
